<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Order Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/admin.css?v=20260719a">
</head>
<body>
<div id="toast" role="status" aria-live="polite"></div>
<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">แก้ไขข้อมูล</div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">ยกเลิก</button>
      <button class="btn btn-primary" id="modalSave">บันทึก</button>
    </div>
  </div>
</div>

<div id="sidebarOverlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-title">&#x1F6CD;&#xFE0F; Order Hub <span class="sidebar-badge">ADMIN</span></div>
      <div class="sidebar-logo-sub">จัดการระบบสั่งซื้อ</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">จัดการ</div>
      <button class="nav-item active" data-panel="orderlists">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        ภาพรวม
      </button>
      <button class="nav-item" data-panel="orders">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        คำสั่งซื้อ
      </button>
      <button class="nav-item" data-panel="products">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        สินค้า
      </button>
      <div class="nav-section">เครื่องมือ</div>
      <button class="nav-item" data-panel="summary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        สรุปยอดลูกค้า
      </button>
      <button class="nav-item" data-panel="stock">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="17"/><line x1="9.5" y1="14.5" x2="14.5" y2="14.5"/></svg>
        คลังสินค้า
      </button>
      <button class="nav-item" data-panel="restock">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        แจ้งเตือนสั่งของ
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-email" id="userEmail">กำลังโหลด...</div>
      </div>

      <button id="logoutBtn" class="logout-btn">
        🚪 ออกจากระบบ
      </button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center;">
        <button id="menuBtn" class="menu-btn" aria-label="เปิดเมนู">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <span class="topbar-title" id="topbarTitle">ภาพรวม</span>
          <span class="topbar-sub" id="topbarSub"></span>
        </div>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content">
      <div class="state-loading"><div class="spinner"></div> กำลังโหลด...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7/dist/umd/supabase.min.js" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>
<script src="js/config.js?v=20260719a"></script>
<script src="js/api.js?v=20260719a"></script>
<script>
// Guard: must be signed in to view the admin panel
if (window.__sb) {
  window.__sb.auth.getSession().then(function (r) {
    if (!r || !r.data || !r.data.session) location.replace('admin-login.html');
  });
}
</script>

<script src="js/admin.js?v=20260719a"></script>
</body>
</html>
